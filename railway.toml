# Web service config (gunicorn).
# The daily collector cron must be added as a SEPARATE service in the
# Railway dashboard: Start Command = "python -m scraper.collect",
# Cron Schedule = "0 12 * * *", with DATABASE_URL variable set.

[build]
builder = "nixpacks"

[deploy]
startCommand = "gunicorn -w 2 -b 0.0.0.0:$PORT web.app:app"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
